<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dakal</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="app">
    <div class="header">
      <svg class="logo" viewBox="0 0 100 120" width="40" height="48">
        <polygon points="50,5 5,115 15,115 50,30 85,115 95,115" fill="#4fc3f7" />
        <rect x="30" y="95" width="40" height="15" fill="#4fc3f7" rx="2" />
        <line x1="50" y1="5" x2="50" y2="30" stroke="#4fc3f7" stroke-width="3" />
      </svg>
      <h1>Dakal</h1>
    </div>

    <div class="status-row">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Disconnected</span>
    </div>

    <button id="connect-btn" class="connect-btn">Connect</button>

    <div class="info">
      <span class="label">Ping</span>
      <span class="value" id="ping-value">-- ms</span>
    </div>
  </div>
  <script type="module" src="src/main.ts"></script>
</body>
</html>
