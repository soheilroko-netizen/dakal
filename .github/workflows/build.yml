name: Build Dakal VPN

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build-msvc:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          architecture: x64

      - run: corepack enable && corepack prepare pnpm@9 --activate
      - run: pnpm store path

      - run: pnpm install
      - run: pnpm run build

      - name: Download sing-box
        run: |
          echo "Downloading sing-box..."
          curl.exe -Lo sing-box.zip "https://github.com/SagerNet/sing-box/releases/download/v1.13.14/sing-box-1.13.14-windows-amd64v3.zip"
          echo "Downloaded. Size:"
          ls -la sing-box.zip
          echo "Extracting..."
          7z x sing-box.zip "-osing-box-tmp" -y
          echo "Extracted files:"
          Get-ChildItem -Recurse sing-box-tmp
          echo "Moving exe..."
          $exe = Get-ChildItem -Recurse sing-box-tmp -Filter "sing-box.exe" | Select-Object -First 1
          if ($exe) { Move-Item $exe.FullName "sing-box.exe" -Force } else { throw "sing-box.exe not found in archive" }
          Remove-Item sing-box.zip -Force
          Remove-Item sing-box-tmp -Recurse -Force
          echo "Done: sing-box.exe ready"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Build zip for portable release
        run: |
          $src = "src-tauri/target/x86_64-pc-windows-msvc/release/dakal.exe"
          $dest = "dakal-portable"
          mkdir $dest -Force
          Copy-Item $src "$dest/dakal.exe"
          Copy-Item "sing-box.exe" "$dest/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$dest/*" -DestinationPath "dakal-v0.1.0.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: dakal-windows
          path: dakal-v0.1.0.zip
          retention-days: 30
